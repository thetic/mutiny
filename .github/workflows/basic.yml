---
name: Basic builds

"on":
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    name: Clang Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: jidicula/clang-format-action@v4.18.0
        with:
          clang-format-version: '22'
          check-path: '.'

  abi_check:
    name: ABI Compatibility Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Install Libabigail
        run: sudo apt-get update && sudo apt-get install -y abigail-tools

      - name: Checkout Base Branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.base_ref }}
          path: baseline

      - name: Configure Baseline Build
        run: cmake --preset shared
        working-directory: baseline

      - name: Build Baseline Library
        run: cmake --build --preset shared --target mutiny
        working-directory: baseline

      - name: Checkout Current Branch
        uses: actions/checkout@v6
        with:
          path: current

      - name: Configure Current Build
        run: cmake --preset shared
        working-directory: current

      - name: Build Current Library
        run: cmake --build --preset shared --target mutiny
        working-directory: current

      - name: Run abidiff
        run: |
          bash current/.github/scripts/abi_check.sh \
            baseline/build/shared/libmutiny.so \
            current/build/shared/libmutiny.so \
            "$(cat baseline/cfg/VERSION)" \
            "$(cat current/cfg/VERSION)"


  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: MSVC install
            os: windows-latest
            preset: MSVC
            install: true
          - name: MSVC 23
            os: windows-latest
            cmake_args: -DCMAKE_CXX_STANDARD=23
            preset: MSVC
          - name: MSVC 20
            os: windows-latest
            cmake_args: -DCMAKE_CXX_STANDARD=20
            preset: MSVC
          - name: ClangCL
            os: windows-latest
            cmake_args: -DCMAKE_CXX_STANDARD=17
            preset: ClangCL
          - name: Clang-Tidy
            os: ubuntu-latest
            preset: clang-tidy
          - name: Linux Clang 11
            os: ubuntu-latest
            cmake_args: -DCMAKE_CXX_STANDARD=11
            preset: Clang
            fetchcontent: true
          - name: Linux Clang 14
            os: ubuntu-latest
            cmake_args: -DCMAKE_CXX_STANDARD=14
            preset: Clang
          - name: Linux Clang 17
            os: ubuntu-latest
            cmake_args: -DCMAKE_CXX_STANDARD=17
            preset: Clang
          - name: Linux Clang 20
            os: ubuntu-latest
            cmake_args: -DCMAKE_CXX_STANDARD=20
            preset: Clang
          - name: Linux Clang 23
            os: ubuntu-latest
            cmake_args: -DCMAKE_CXX_STANDARD=23
            preset: Clang
          - name: Detailed
            os: ubuntu-latest
            preset: detailed
          - name: Linux GNU Install
            os: ubuntu-latest
            cmake_args: -DCMAKE_CXX_STANDARD=11
            preset: GNU
            install: true
          - name: Linux GNU 14
            os: ubuntu-latest
            cmake_args: -DCMAKE_CXX_STANDARD=14
            preset: GNU
          - name: Linux GNU 17
            os: ubuntu-latest
            cmake_args: -DCMAKE_CXX_STANDARD=17
            preset: GNU
          - name: Linux GNU 20
            os: ubuntu-latest
            cmake_args: -DCMAKE_CXX_STANDARD=20
            preset: GNU
          - name: Linux GNU 23
            os: ubuntu-latest
            cmake_args: -DCMAKE_CXX_STANDARD=23
            preset: GNU
          - name: MinGW
            os: ubuntu-latest
            preset: MinGW
            apt_packages: mingw-w64 wine64
          - name: No C++ Standard Library
            os: ubuntu-latest
            preset: no-std-cpp
          - name: No RTTI
            os: ubuntu-latest
            preset: no-rtti
          - name: No Exceptions
            os: ubuntu-latest
            preset: no-exceptions
          - name: Coverage
            os: ubuntu-latest
            preset: coverage
            apt_packages: lcov
          - name: Address Sanitizer
            os: ubuntu-latest
            preset: asan
          - name: Linux Shared Library
            os: ubuntu-latest
            preset: shared
            install: true
          - name: GCC ARM embedded
            os: ubuntu-latest
            preset: arm-embedded
          - name: Mac install
            os: macos-latest
            preset: defaults
            install: true
          - name: Apple Clang 14
            os: macos-latest
            cmake_args: -DCMAKE_CXX_STANDARD=14
            preset: Clang
          - name: Apple Clang 17
            os: macos-latest
            cmake_args: -DCMAKE_CXX_STANDARD=17
            preset: Clang
          - name: Apple Clang 20
            os: macos-latest
            cmake_args: -DCMAKE_CXX_STANDARD=20
            preset: Clang
          - name: Apple Clang 23
            os: macos-latest
            cmake_args: -DCMAKE_CXX_STANDARD=23
            preset: Clang
          - name: Mac GNU 14
            os: macos-latest
            cmake_args: -DCMAKE_CXX_STANDARD=14
            preset: GNU
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      ### SETUP

      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}
        if: ${{ matrix.apt_packages }}

      - uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          key: ${{ matrix.name }}
          variant: ccache

      - uses: carlosperate/arm-none-eabi-gcc-action@v1
        if: ${{ matrix.name == 'GCC ARM embedded' }}

      - name: Checkout
        uses: actions/checkout@v6

      ## BUILD AND TEST

      - name: Workflow
        run: cmake --workflow --preset ${{ matrix.preset }}
        if: ${{ !matrix.cmake_args }}
      - name: Configure
        run: cmake --preset ${{ matrix.preset }} ${{ matrix.cmake_args }}
        if: ${{ matrix.cmake_args }}
      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}
        if: ${{ matrix.cmake_args }}
      - name: Test
        run: ctest --preset ${{ matrix.preset }}
        if: ${{ matrix.cmake_args }}

      # POST PROCESSING

      - name: Install (*nix)
        run: |
          sudo cmake --install build/${{ matrix.preset }}/
        if: ${{ matrix.install && !startswith(matrix.os, 'windows')}}
      - name: Install (Windows)
        run: cmake --install build/${{ matrix.preset }}/ --config=Debug
        if: ${{ matrix.install && startswith(matrix.os, 'windows')}}
      - name: Use install
        run: |
          cmake -B examples_build -S examples
          cmake --build examples_build -j
          ctest --test-dir examples_build
        if: ${{ matrix.install }}

      - name: Use FetchContent (source build)
        run: |
          cmake -B examples_fc_build -S examples \
            -DFETCHCONTENT_SOURCE_DIR_MU.TINY=${{ github.workspace }}
          cmake --build examples_fc_build -j
          ctest --test-dir examples_fc_build
        if: ${{ matrix.fetchcontent }}

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          path-to-lcov: build/coverage/coverage.lcov
        if: ${{ matrix.name == 'Coverage' }}

  test_report:
    name: JUnit Test Report
    runs-on: ubuntu-latest
    env:
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          variant: ccache
      - run: cmake --preset=defaults -DMUTINY_JUNIT_REPORT=TRUE
      - run: cmake --build --preset defaults
      - run: ctest --preset defaults
      - uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: test-results
          path: "build/defaults/**/mutiny_*.xml"

  cmake_msys:
    name: MSYS
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    env:
      LDFLAGS: -static
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            git
            mingw-w64-x86_64-cc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-make
            mingw-w64-x86_64-ccache
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          variant: ccache
      - name: Workflow
        run: cmake --workflow --preset GNU

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Install Doxygen
        uses: ssciwr/doxygen-install@v1
        with:
          version: "1.16.1"
      - name: Build documentation
        run: uv run --project docs make -C docs html
      - uses: actions/upload-artifact@v7
        with:
          name: docs
          path: docs/_build/html

  source_archive:
    name: Source Archive
    runs-on: ubuntu-latest
    env:
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: hendrikmuhs/ccache-action@v1.2.22
        with:
          variant: ccache
      - name: Configure
        run: cmake --preset GNU
      - name: Package
        run: cpack --preset source
      - name: Extract archive
        run: |
          mkdir archive
          tar -xzf build/GNU/mutiny-*-Source.tar.gz -C archive --strip-components=1
      - name: Build examples from archive
        run: |
          cmake -B examples_build -S examples \
            -DFETCHCONTENT_SOURCE_DIR_MU.TINY=${{ github.workspace }}/archive
          cmake --build examples_build -j
          ctest --test-dir examples_build

  cygwin:
    name: Cygwin
    runs-on: windows-latest
    steps:
      - name: Set line endings
        run: git config --global core.autocrlf input
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Cygwin
        uses: cygwin/cygwin-install-action@v6
        with:
          packages: >
            cmake
            gcc-core
            gcc-g++
            ninja
      - name: Configure
        run: cmake --preset=GNU -G Ninja
      - name: Build
        run: cmake --build --preset GNU
      - name: Test
        run: ctest --preset GNU
