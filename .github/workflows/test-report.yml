---
name: 'Test Report'
"on":
  workflow_run:
    workflows: ['Basic builds']
    types:
      - completed
permissions:
  checks: write
  pull-requests: write
jobs:
  report:
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: dorny/test-reporter@v1
        with:
          artifact: test-results
          name: JUnit Tests
          path: "**/cpputest_*.xml"
          reporter: java-junit
